{% extends "base.html" %}
{% block title %}{{ "Modifier" if contact else "Nouveau" }} contact{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ "Modifier " + contact.name if contact else "Nouveau contact" }}</h1>
<form method="post" class="card card-body" action="{{ '/contacts/' ~ contact.id ~ '/edit' if contact else '/contacts/new' }}">
  <div class="row g-3">
    <div class="col-md-3"><label class="form-label">Type</label>
      <select class="form-select" name="type">
        {% for t in types %}<option value="{{ t.value }}" {% if contact and contact.type == t %}selected{% endif %}>{{ t.value | status_label }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-5"><label class="form-label">Nom *</label><input class="form-control" name="name" required value="{{ contact.name if contact else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Société</label><input class="form-control" name="company" value="{{ contact.company if contact else '' }}"></div>
    <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" value="{{ contact.email if contact else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Téléphone</label><input class="form-control" name="phone" value="{{ contact.phone if contact else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Spécialité / corps de métier</label><input class="form-control" name="specialty" value="{{ contact.specialty if contact else '' }}"></div>
    <div class="col-12"><label class="form-label">Adresse</label><textarea class="form-control" name="address" rows="2">{{ contact.address if contact else '' }}</textarea></div>
    <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="3">{{ contact.notes if contact else '' }}</textarea></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary">Enregistrer</button>
  <a class="btn btn-outline-secondary" href="/contacts">Annuler</a></div>
</form>
{% endblock %}
