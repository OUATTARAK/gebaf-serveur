{% extends "base.html" %}
{% block title %}{{ "Modifier" if client else "Nouveau" }} client{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ "Modifier " + client.name if client else "Nouveau client" }}</h1>
<form method="post" class="card card-body" action="{{ '/clients/' ~ client.id ~ '/edit' if client else '/clients/new' }}">
  <div class="row g-3">
    <div class="col-md-8"><label class="form-label">Nom *</label><input class="form-control" name="name" required value="{{ client.name if client else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Type</label>
      <select class="form-select" name="type">
        {% for t in types %}<option value="{{ t.value }}" {% if client and client.type == t %}selected{% endif %}>{{ t.value | status_label }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" value="{{ client.email if client else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Téléphone</label><input class="form-control" name="phone" value="{{ client.phone if client else '' }}"></div>
    <div class="col-md-3"><label class="form-label">SIRET</label><input class="form-control" name="siret" value="{{ client.siret if client else '' }}"></div>
    <div class="col-12"><label class="form-label">Adresse</label><textarea class="form-control" name="address" rows="3">{{ client.address if client else '' }}</textarea></div>
    <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="3">{{ client.notes if client else '' }}</textarea></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary"><i class="bi bi-check-lg"></i> Enregistrer</button>
    <a class="btn btn-outline-secondary" href="/clients">Annuler</a></div>
</form>
{% endblock %}
