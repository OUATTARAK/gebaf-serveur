{% extends "base.html" %}
{% block title %}Saisir des heures{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Saisir des heures</h1>
<form method="post" class="card card-body" action="/heures/new">
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Chantier *</label>
      <select class="form-select" name="chantier_id" required>
        <option value="">— Sélectionner —</option>
        {% for c in chantiers %}<option value="{{ c.id }}" {% if selected_chantier == c.id %}selected{% endif %}>{{ c.reference }} — {{ c.name }}</option>{% endfor %}
      </select>
    </div>
    {% if user.role.value not in ("worker", "viewer") %}
    <div class="col-md-6"><label class="form-label">Personne</label>
      <select class="form-select" name="user_id">
        <option value="">— Moi-même —</option>
        {% for u in users %}<option value="{{ u.id }}">{{ u.full_name }}</option>{% endfor %}
      </select>
    </div>
    {% endif %}
    <div class="col-md-3"><label class="form-label">Date *</label><input type="date" class="form-control" name="date_val" required value="{{ today }}"></div>
    <div class="col-md-3"><label class="form-label">Heures *</label><input class="form-control" name="hours" inputmode="decimal" required placeholder="ex: 7.5"></div>
    <div class="col-md-3"><label class="form-label">Tarif horaire (F CFA)</label><input class="form-control" name="hourly_rate" inputmode="decimal" value="0"></div>
    <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3"></textarea></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary">Enregistrer</button>
  <a class="btn btn-outline-secondary" href="/heures">Annuler</a></div>
</form>
{% endblock %}
